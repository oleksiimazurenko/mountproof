<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Button — baseline (v2)</title>
  <style>
    body { margin: 0; padding: 80px; font: 16px/1.5 system-ui, sans-serif; background: #f5f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    /* Old-style button — flat blue */
    .btn-v2 {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 6px;
      font: 600 14px/1 system-ui, sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="btn-v2" data-test-id="cta-button">Continue</button>
</body>
</html>
