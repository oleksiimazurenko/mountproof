<!doctype html>
<html lang="en">
<head>

  <title>Button — target (v3)</title>

    .btn-v3 {
      padding: 14px 28px;
      background: linear-gradient(180deg, #4338ca 0%, #6366f1 100%);

      border-radius: 10px;
      font: 600 15px/1 system-ui, sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(67, 56, 202, 0.25);
    }
  </style>
  <style>
    body { margin: 0; padding: 80px; font: 16px/1.5 system-ui, sans-serif; background: #f5f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  <button class="btn-v3" data-test-id="cta-button">Continue</button>
